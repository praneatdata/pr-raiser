display_information:
  name: PR Raiser
  description: Opens a GitHub PR from a compare link shared in Slack.
features:
  bot_user:
    display_name: pr-raiser
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - channels:history
      - groups:history
      - im:history
      - mpim:history
settings:
  event_subscriptions:
    request_url: https://pr-raiser.vercel.app/slack/events
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: false
  socket_mode_enabled: false
  org_deploy_enabled: false
  token_rotation_enabled: false
